# Server configuration
server.port=${PORT:8080}

# Gmail SMTP configuration
# IMPORTANT: Use Gmail App Password, not your normal Gmail password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Portfolio owner inbox where contact form messages should arrive
portfolio.mail.to=${MAIL_TO}

# Frontend URL allowed to call backend
# Local default is Vite dev server. Change this after deployment.
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.org.springframework.web=INFO
