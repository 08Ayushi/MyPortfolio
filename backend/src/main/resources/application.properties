# Server configuration
server.port=${PORT:8080}

# Load secrets from .env (copy from .env.example into backend/.env)
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Gmail SMTP configuration
# IMPORTANT: Use Gmail App Password, not your normal Gmail password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Portfolio owner inbox where contact form messages should arrive
portfolio.mail.to=${MAIL_TO}

# Frontend URL allowed to call backend (also allows https://*.devtunnels.ms via CorsConfig)
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.org.springframework.web=INFO
